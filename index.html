<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1d4f72">
    <title>赴任持ち物リスト ブリュッセル版</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="app/styles.css?v=2">
    <script src="data/checklist.js?v=2" defer></script>
    <script src="app/app.js?v=2" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="assets/app-icon.svg" alt="" class="brand-icon">
        <div>
          <h1>赴任持ち物リスト</h1>
          <p>ブリュッセル版</p>
        </div>
      </div>
      <div class="actions" aria-label="データ操作">
        <button id="copyShare" class="button">
          <span aria-hidden="true">↗</span>
          共有
        </button>
        <button id="exportState" class="button">
          <span aria-hidden="true">↓</span>
          書き出し
        </button>
        <label class="button file-button">
          <span aria-hidden="true">↑</span>
          読み込み
          <input id="importState" type="file" accept="application/json">
        </label>
      </div>
    </header>

    <main>
      <section class="summary" aria-label="進捗">
        <div class="progress-block">
          <div class="progress-copy">
            <span id="progressLabel">0 / 0</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <div class="summary-grid">
          <div>
            <span>必須</span>
            <strong id="requiredCount">0</strong>
          </div>
          <div>
            <span>購入必要</span>
            <strong id="purchaseCount">0</strong>
          </div>
          <div>
            <span>航空便</span>
            <strong id="airCount">0</strong>
          </div>
          <div>
            <span>船便</span>
            <strong id="seaCount">0</strong>
          </div>
          <div>
            <span>手荷物</span>
            <strong id="carryCount">0</strong>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="絞り込み">
        <label class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="アイテム・備考を検索" autocomplete="off">
        </label>

        <select id="categoryFilter" aria-label="大カテゴリ">
          <option value="all">すべてのカテゴリ</option>
        </select>

        <div class="segmented" role="group" aria-label="持ち運び方法">
          <button class="segment is-active" data-route="all">すべて</button>
          <button class="segment" data-route="air">航空便</button>
          <button class="segment" data-route="sea">船便</button>
          <button class="segment" data-route="carry">手荷物</button>
        </div>

        <label class="toggle">
          <input id="pendingOnly" type="checkbox">
          <span>未準備のみ</span>
        </label>

        <div class="segmented compact" role="group" aria-label="必須">
          <button class="segment is-active" data-importance="all">全て</button>
          <button class="segment" data-importance="required">必須</button>
          <button class="segment" data-importance="optional">任意</button>
        </div>

        <label class="toggle">
          <input id="purchaseOnly" type="checkbox">
          <span>購入必要のみ</span>
        </label>
      </section>

      <section class="bulk-row" aria-label="一括操作">
        <button id="checkVisible" class="button secondary">
          <span aria-hidden="true">✓</span>
          表示分を準備済み
        </button>
        <button id="uncheckVisible" class="button secondary">
          <span aria-hidden="true">□</span>
          表示分を未準備
        </button>
        <button id="resetAll" class="button danger">
          <span aria-hidden="true">↺</span>
          リセット
        </button>
      </section>

      <div id="activeFilters" class="filter-chips" aria-live="polite"></div>
      <section id="list" class="checklist" aria-label="持ち物"></section>
      <p id="emptyState" class="empty" hidden>該当するアイテムがありません。</p>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
